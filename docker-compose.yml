services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dkos
      POSTGRES_PASSWORD: dkos
      POSTGRES_DB: dkos
    ports:
      - "5432:5432"
    volumes:
      - dkos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dkos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dkos_pgdata:
